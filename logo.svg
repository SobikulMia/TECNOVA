<svg width="220" height="48" viewBox="0 0 220 48" xmlns="http://www.w3.org/2000/svg">
  <!-- Mark: stylized "N" formed by a circuit-bolt path inside a rounded square -->
  <defs>
    <linearGradient id="tnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>

  <rect x="0" y="4" width="40" height="40" rx="10" fill="url(#tnGrad)"/>

  <!-- Circuit-style N / lightning hybrid -->
  <path d="M12 32 L12 16 L17 16 L26 28 L26 16 L31 16 L31 32 L26 32 L17 20 L17 32 Z"
        fill="#FFFFFF"/>

  <!-- Tiny node dot accenting the "tech" feel -->
  <circle cx="31" cy="16" r="2.4" fill="#FFFFFF"/>
  <circle cx="12" cy="32" r="2.4" fill="#FFFFFF" opacity="0.85"/>

  <!-- Wordmark -->
  <text x="50" y="30" font-family="Poppins, Inter, sans-serif" font-weight="700" font-size="22" fill="#0F172A">Tech<tspan fill="#1E3A8A">Nova</tspan></text>
</svg>
